  - Railway에 올라간 원격 서버에 연결
  - 서버 쪽 vault 파일에 저장

예를 들면 이렇습니다.

1. ChatGPT가 `local`에 메모 저장
2. 그 메모는 **내 PC 폴더**에 저장됨
3. 그런데 Cursor가 `production`을 보고 있으면
4. 그 메모는 안 보임

왜냐하면 **다른 창고를 보고 있기 때문**입니다.

반대로도 같습니다.

1. production에 저장
2. 그 메모는 **원격 서버 창고**에 저장됨
3. 내가 local만 보고 있으면
4. 내 로컬 vault에는 안 보임

**핵심 한 줄**

- `local` = 내 컴퓨터 창고
- `production` = 인터넷 서버 창고

**파일 기준으로 보면**

- Cursor가 어디에 붙을지는 [.cursor/mcp.json](C:/Users/jichu/Downloads/mcp_obsidian/.cursor/mcp.json) 이 정합니다.
- local 주소: `http://127.0.0.1:8000/mcp`
- production 주소: `https://mcp-server-production-90cb.up.railway.app/mcp`

