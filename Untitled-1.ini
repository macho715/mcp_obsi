## 1. 원본 자료 저장소

| 구분 | 의미 | 실제 경로 |
|---|---|---|
| `vault/raw` | 사람이 넣은 원본 자료 보관소입니다. 웹문서, PDF, 수동 메모 같은 원본입니다. MCP가 주 저장 대상으로 쓰는 곳은 아닙니다. | `VAULT_PATH/raw/...` |
| `vault/mcp_raw` | MCP가 받은 원문 대화, 원문 transcript를 저장하는 곳입니다. | `VAULT_PATH/mcp_raw/<source>/<YYYY-MM-DD>/<mcp_id>.md` |
| `vault/memory` | MCP가 만든 메모 노트 저장소입니다. 실제 장기 기억이 Markdown으로 쌓이는 곳입니다. | `VAULT_PATH/memory/<YYYY>/<MM>/<MEMORY_ID>.md` |
| legacy memory | 예전 구조 호환용입니다. | `VAULT_PATH/20_AI_Memory/...` |
| daily note | 일일노트에 메모 흔적을 추가할 때 쓰입니다. | `VAULT_PATH/10_Daily/<YYYY-MM-DD>.md` |

## 2. 빠른 검색용 DB

| 구분 | 의미 | 실제 경로 |
|---|---|---|
| SQLite index | 검색 속도를 위한 보조 인덱스입니다. 원본 저장소가 아니라 재생성 가능한 검색용 DB입니다. | `INDEX_DB_PATH` |
| 기본값 | 별도 환경변수를 안 주면 여기로 갑니다. | `./data/memory_index.sqlite3` |

